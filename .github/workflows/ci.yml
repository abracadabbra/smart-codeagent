name: CI

# 每次 push 到 main 或提交 PR 时跑一遍，确保不会破坏构建。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────────────────
  # 前端检查
  # ───────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: 前端构建
        run: npm run build

  # ───────────────────────────────────────────────────────────
  # 后端检查
  # ───────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: 安装 Rust 稳定工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cargo check
        run: cargo check --all-targets
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test --lib
        working-directory: src-tauri

      - name: Cargo fmt 检查
        run: cargo fmt -- --check
        working-directory: src-tauri

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
